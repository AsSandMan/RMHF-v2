<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .card { background: white; border-radius: 20px; padding: 25px; width: 90%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #666; }
        .balance { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #0088cc; }
        button { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #0077b5; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Основной кошелек</h2>
        <div class="balance" id="wallet">0.00 $</div>
    </div>

    <div class="card">
        <h2>Отложенные (Piggy Bank)</h2>
        <div class="balance" id="piggy">0.00 $</div>
        <button onclick="sendMoney()">Отложить 10$</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || null;

        if (tg) {
            tg.ready();
            tg.expand();

            const userId = tg.initDataUnsafe?.user?.id;

            // Если в URL нет user_id, перезагружаем страницу с ним
            const urlParams = new URLSearchParams(window.location.search);
            if (userId && !urlParams.has('user_id')) {
                urlParams.set('user_id', userId);
                window.location.search = urlParams.toString();
            }
            
            // Остальной твой код (fetch, формы и т.д.)
        }

        let tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe.user.id;

        async function loadData() {
            const response = await fetch(`/api/get_balance?user_id=${userId}`);
            const data = await response.json();
            document.getElementById('wallet').innerText = data.wallet.toFixed(2) + ' $';
            document.getElementById('piggy').innerText = data.piggy.toFixed(2) + ' $';
        }

        async function sendMoney() {
            const response = await fetch('/api/transfer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, amount: 10})
            });
            const result = await response.json();
            if (result.success) loadData();
            else alert("Недостаточно средств!");
        }

        loadData();
    </script>
</body>
</html>
