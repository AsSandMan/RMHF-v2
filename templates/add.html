<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая операция</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 font-sans">
  <div class="max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-8">
        <a href="/?user_id={{ user_id }}" class="text-indigo-600 font-bold">← Назад</a>
        <h1 class="text-xl font-bold">Добавить</h1>
    </div>

    <form method="POST" action="/{{ user_id }}/add" class="bg-white rounded-3xl p-8 shadow-sm space-y-6">
      <div>
        <label class="block text-gray-500 text-sm mb-2">Тип операции</label>
        <div class="grid grid-cols-2 gap-2">
            <label class="flex items-center justify-center p-4 border rounded-2xl cursor-pointer has-[:checked]:bg-green-50 has-[:checked]:border-green-500 transition-all">
                <input type="radio" name="type" value="income" class="hidden" checked>
                <span class="font-bold text-green-600">Доход</span>
            </label>
            <label class="flex items-center justify-center p-4 border rounded-2xl cursor-pointer has-[:checked]:bg-red-50 has-[:checked]:border-red-500 transition-all">
                <input type="radio" name="type" value="expense" class="hidden">
                <span class="font-bold text-red-600">Расход</span>
            </label>
        </div>
      </div>

      <input type="number" step="0.01" name="amount" required placeholder="0.00 ₽" 
             class="w-full p-6 bg-gray-50 rounded-2xl text-3xl font-black text-center focus:outline-indigo-500">

      <select name="account" class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500">
          <option value="cash text-lg">💵 Наличные</option>
          <option value="card text-lg">💳 Карта</option>
          <option value="savings text-lg">🐷 Копилка</option>
      </select>

      <input type="text" name="category" placeholder="Категория (Еда, ЗП...)" 
             class="w-full p-4 bg-gray-50 rounded-xl focus:outline-indigo-500">

      <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">
        Сохранить
      </button>
    </form>
  </div>
</body>
</html>
