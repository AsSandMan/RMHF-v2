<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавить операцию</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
  <div class="max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-6">
        <a href="/?user_id={{ user_id }}" class="text-indigo-600 font-bold">← Назад</a>
        <h1 class="text-xl font-bold">Новая операция</h1>
    </div>

    <form method="POST" action="/{{ user_id }}/add" class="bg-white rounded-2xl shadow-sm p-6 space-y-5">
      <div>
        <label class="block text-gray-600 text-sm mb-2">Тип</label>
        <div class="grid grid-cols-2 gap-2">
            <label class="flex items-center justify-center p-3 border rounded-xl cursor-pointer hover:bg-gray-50 has-[:checked]:bg-green-50 has-[:checked]:border-green-500">
                <input type="radio" name="type" value="income" class="hidden" checked>
                <span class="font-medium text-green-600">Доход</span>
            </label>
            <label class="flex items-center justify-center p-3 border rounded-xl cursor-pointer hover:bg-gray-50 has-[:checked]:bg-red-50 has-[:checked]:border-red-500">
                <input type="radio" name="type" value="expense" class="hidden">
                <span class="font-medium text-red-600">Расход</span>
            </label>
        </div>
      </div>

      <div>
        <label class="block text-gray-600 text-sm mb-2">Сумма</label>
        <input type="number" step="0.01" name="amount" required placeholder="0.00" 
               class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-2xl font-bold focus:outline-indigo-500">
      </div>

      <div>
        <label class="block text-gray-600 text-sm mb-2">Счет</label>
        <select name="account" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-indigo-500">
          <option value="cash">Наличные 💵</option>
          <option value="card">Карта 💳</option>
          <option value="savings">Копилка 🐷</option>
        </select>
      </div>

      <div>
        <label class="block text-gray-600 text-sm mb-2">Категория</label>
        <input type="text" name="category" placeholder="Напр: Продукты, Зарплата" 
               class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-indigo-500">
      </div>

      <div>
        <label class="block text-gray-600 text-sm mb-2">Заметка</label>
        <textarea name="note" rows="2" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-indigo-500"></textarea>
      </div>

      <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 active:scale-95 transition-all">
        Сохранить
      </button>
    </form>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
  </script>
</body>
</html>
