<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перевод — Моя Бухгалтерия</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <div class="container mx-auto px-4 py-8 max-w-lg">

    <h1 class="text-3xl font-bold text-gray-800 text-center mb-8">
      Перевод между счетами
    </h1>

    <form action="/transfer" method="POST" class="bg-white rounded-2xl shadow-md p-8 space-y-6">
      
      <div>
        <label for="from_account" class="block text-gray-700 font-medium mb-2">Списать с</label>
        <select 
          id="from_account" 
          name="from_account" 
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-800"
        >
          <option value="cash">Наличные</option>
          <option value="card">Карта</option>
          <option value="savings">Копилка (отложенное)</option>
          <option value="other">Другое</option>
        </select>
      </div>

      <div class="flex justify-center -my-3">
        <div class="bg-blue-100 text-blue-600 rounded-full p-2 shadow-inner">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
          </svg>
        </div>
      </div>

      <div>
        <label for="to_account" class="block text-gray-700 font-medium mb-2">Зачислить на</label>
        <select 
          id="to_account" 
          name="to_account" 
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-800"
        >
          <option value="card">Карта</option>
          <option value="cash">Наличные</option>
          <option value="savings">Копилка (отложенное)</option>
          <option value="other">Другое</option>
        </select>
      </div>

      <div>
        <label for="amount" class="block text-gray-700 font-medium mb-2">Сумма перевода (₽)</label>
        <input 
          type="number" 
          id="amount" 
          name="amount" 
          step="0.01" 
          min="0.01" 
          required 
          placeholder="0.00"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-xl font-medium"
        >
      </div>

      <div class="flex gap-4 pt-4">
        <button 
          type="submit" 
          class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors shadow-md"
        >
          Перевести
        </button>
        <a 
          href="{{ url_for('/{{ user_id }}/index') }}" 
          class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-6 rounded-xl text-center transition-colors"
        >
          Отмена
        </a>
      </div>

    </form>

  </div>

  <script>
    // Простая валидация, чтобы не переводить самому себе
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
      const from = document.getElementById('from_account').value;
      const to = document.getElementById('to_account').value;
      if (from === to) {
        e.preventDefault();
        alert('Выберите разные счета для перевода!');
      }
    });
  </script>

<script>
  // Безопасный доступ к Telegram.WebApp
  const tg = window.Telegram?.WebApp || null;

  if (tg) {
    // Это настоящий Telegram Mini App — выполняем все действия
    tg.ready();
    tg.expand();

    console.log("Mini App запущен, initData:", tg.initData ? "пришёл" : "не пришёл");

    const userId = tg.initDataUnsafe?.user?.id || null;

    // Передача user_id в каждый запрос
    const originalFetch = window.fetch;
    window.fetch = function(url, options = {}) {
      options.headers = options.headers || {};
      if (userId) {
        options.headers["X-User-Id"] = userId;
      }
      return originalFetch(url, options);
    };

    // Передача user_id в формы (POST)
    document.querySelectorAll("form").forEach(form => {
      const hidden = document.createElement("input");
      hidden.type = "hidden";
      hidden.name = "user_id";
      hidden.value = userId || '';
      form.appendChild(hidden);
    });

    // Тема от Telegram
    if (tg.themeParams) {
      document.body.style.background = tg.themeParams.bg_color || "#f3f4f6";
      document.body.style.color = tg.themeParams.text_color || "#000";
    }
  } else {
    // Это обычный браузер — ничего не ломаем
    console.log("Это НЕ Telegram Mini App — обычный браузер");
    // Можно показать предупреждение, если хочешь
    // document.body.innerHTML += '<div style="position:fixed; bottom:10px; left:10px; background:red; color:white; padding:10px;">Приложение работает только внутри Telegram</div>';
  }
</script>

</body>
</html>
