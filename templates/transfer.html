<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перевод</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
  <div class="max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-8">
        <a href="/?user_id={{ user_id }}" class="text-indigo-600 font-bold">← Назад</a>
        <h1 class="text-xl font-bold">Перевод</h1>
    </div>

    <form method="POST" action="/transfer" id="transferForm" class="bg-white rounded-3xl p-8 shadow-sm space-y-6">
      <input type="hidden" name="user_id" id="user_id_input">

      <div class="space-y-2">
        <label class="text-sm text-gray-500 ml-1">Откуда</label>
        <select name="from_account" class="w-full p-4 bg-gray-50 rounded-xl focus:ring-2 focus:ring-indigo-500">
            <option value="cash">💵 Наличные</option>
            <option value="card">💳 Карта</option>
            <option value="savings">🐷 Копилка</option>
        </select>
      </div>

      <div class="flex justify-center -my-4 relative z-10">
          <div class="bg-white p-2 rounded-full shadow-md border border-gray-100 text-indigo-600 font-bold">↓</div>
      </div>

      <div class="space-y-2">
        <label class="text-sm text-gray-500 ml-1">Куда</label>
        <select name="to_account" class="w-full p-4 bg-gray-50 rounded-xl focus:ring-2 focus:ring-indigo-500">
            <option value="savings">🐷 Копилка</option>
            <option value="card">💳 Карта</option>
            <option value="cash">💵 Наличные</option>
        </select>
      </div>

      <input type="number" step="0.01" name="amount" required placeholder="Сумма перевода" 
             class="w-full p-6 bg-gray-50 rounded-2xl text-2xl font-bold text-center focus:outline-indigo-500">

      <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">
        Перевести
      </button>
    </form>
  </div>

  <script>
    const tg = window.Telegram?.WebApp || null;
    if (tg) {
        tg.ready();
        document.getElementById('user_id_input').value = tg.initDataUnsafe?.user?.id || "";
    }
  </script>
</body>
</html>
